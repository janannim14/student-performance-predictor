<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Performance Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --card:     #1a1d27;
      --border:   #2e3148;
      --accent:   #6c63ff;
      --accent2:  #00d4aa;
      --text:     #e8eaf6;
      --muted:    #8b8fa8;
      --danger:   #ff6b6b;
      --success:  #00d4aa;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.95rem;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 620px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    select, input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 0.9rem;
      padding: 12px 14px;
      transition: border-color 0.2s;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    select { cursor: pointer; }
    select:focus, input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }

    .btn {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 15px;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
      letter-spacing: 0.03em;
    }
    .btn:hover  { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Result */
    #result {
      margin-top: 28px;
      display: none;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .result-card {
      background: linear-gradient(135deg, rgba(108,99,255,0.12), rgba(0,212,170,0.08));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
    }
    .result-emoji { font-size: 3rem; margin-bottom: 8px; }
    .result-score {
      font-size: 3.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .result-grade {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent2);
      margin: 8px 0;
    }
    .result-advice {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .error-msg {
      background: rgba(255,107,107,0.12);
      border: 1px solid var(--danger);
      border-radius: 10px;
      color: var(--danger);
      font-size: 0.88rem;
      padding: 12px 16px;
      text-align: center;
    }

    /* Footer */
    footer {
      margin-top: 40px;
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
    }

    @media (max-width: 500px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎓 Student Performance Predictor</h1>
  <p>Powered by Machine Learning · Built by Jananni M</p>
</header>

<div class="card">
  <div class="form-grid">

    <div class="form-group">
      <label>Gender</label>
      <select id="gender">
        <option value="female">Female</option>
        <option value="male">Male</option>
      </select>
    </div>

    <div class="form-group">
      <label>Race / Ethnicity</label>
      <select id="race_ethnicity">
        <option value="group A">Group A</option>
        <option value="group B">Group B</option>
        <option value="group C">Group C</option>
        <option value="group D">Group D</option>
        <option value="group E">Group E</option>
      </select>
    </div>

    <div class="form-group full">
      <label>Parental Level of Education</label>
      <select id="parental_education">
        <option value="some high school">Some High School</option>
        <option value="high school">High School</option>
        <option value="some college">Some College</option>
        <option value="associate's degree">Associate's Degree</option>
        <option value="bachelor's degree">Bachelor's Degree</option>
        <option value="master's degree">Master's Degree</option>
      </select>
    </div>

    <div class="form-group">
      <label>Lunch Type</label>
      <select id="lunch">
        <option value="standard">Standard</option>
        <option value="free/reduced">Free / Reduced</option>
      </select>
    </div>

    <div class="form-group">
      <label>Test Prep Course</label>
      <select id="test_prep_course">
        <option value="none">None</option>
        <option value="completed">Completed</option>
      </select>
    </div>

    <button class="btn" id="predictBtn" onclick="predict()">
      Predict Score ✨
    </button>
  </div>

  <!-- Result -->
  <div id="result"></div>
</div>

<footer>
  Student Performance Predictor · ML Project · Jananni M · 2025
</footer>

<script>
  async function predict() {
    const btn = document.getElementById("predictBtn");
    const resultDiv = document.getElementById("result");

    const payload = {
      gender:             document.getElementById("gender").value,
      race_ethnicity:     document.getElementById("race_ethnicity").value,
      parental_education: document.getElementById("parental_education").value,
      lunch:              document.getElementById("lunch").value,
      test_prep_course:   document.getElementById("test_prep_course").value,
    };

    btn.disabled = true;
    btn.textContent = "Predicting...";
    resultDiv.style.display = "none";

    try {
      const res  = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (data.success) {
        resultDiv.innerHTML = `
          <div class="result-card">
            <div class="result-emoji">${data.emoji}</div>
            <div class="result-score">${data.predicted_score}</div>
            <div class="result-grade">Grade: ${data.grade}</div>
            <div class="result-advice">${data.advice}</div>
          </div>`;
      } else {
        resultDiv.innerHTML = `<div class="error-msg">⚠️ ${data.error}</div>`;
      }
    } catch (err) {
      resultDiv.innerHTML = `<div class="error-msg">⚠️ Could not connect to server. Is Flask running?</div>`;
    }

    resultDiv.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Predict Score ✨";
  }
</script>

</body>
</html>
